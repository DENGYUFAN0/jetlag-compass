<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" role="img" aria-label="jetlag-compass banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3f7"/><stop offset="1" stop-color="#e6eef5"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e08a44"/><stop offset="0.5" stop-color="#3a7fc0"/><stop offset="1" stop-color="#2a3550"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="380" fill="url(#bg)"/>
  <rect x="1" y="1" width="1098" height="378" fill="none" stroke="#d9e3ec" stroke-width="2"/>
  <text x="56" y="78" font-family="Georgia,serif" font-size="22" fill="#3a7fc0">✦</text>
  <text x="54" y="172" font-family="Georgia,serif" font-size="60" font-weight="600" fill="#1a2430">jetlag-compass</text>
  <text x="58" y="214" font-size="21" fill="#54667a">Science-based jet-lag &amp; circadian planner</text>
  <text x="58" y="242" font-size="15" fill="#8aa0b2">靠光照而非运气倒时差 · 基于昼夜节律的逐日计划</text>
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#3a7fc0">
    <rect x="58" y="266" width="96" height="30" rx="15" fill="none" stroke="#bcd2e6"/><text x="106" y="286" text-anchor="middle">Circadian</text>
    <rect x="164" y="266" width="92" height="30" rx="15" fill="none" stroke="#bcd2e6"/><text x="210" y="286" text-anchor="middle">Bilingual</text>
    <rect x="266" y="266" width="108" height="30" rx="15" fill="none" stroke="#bcd2e6"/><text x="320" y="286" text-anchor="middle">No backend</text>
  </g>
  <g transform="translate(720,72)">
    <rect width="324" height="236" rx="14" fill="#ffffff" stroke="#d9e3ec"/>
    <path d="M30 180 A130 130 0 0 1 294 180" fill="none" stroke="url(#sky)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="44" cy="150" r="13" fill="#e08a44"/>
    <circle cx="280" cy="150" r="13" fill="#2a3550"/><circle cx="276" cy="146" r="11" fill="#ffffff"/><circle cx="280" cy="150" r="11" fill="#2a3550"/>
    <path d="M44 180 C 120 70, 204 70, 280 180" fill="none" stroke="#54667a" stroke-width="1.6" stroke-dasharray="4 5"/>
    <g fill="#3a7fc0"><circle cx="162" cy="92" r="3.5"/></g>
    <text x="162" y="200" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#8aa0b2">shift sleep · time your light</text>
    <text x="44" y="208" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#54667a">home</text>
    <text x="280" y="208" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#54667a">dest</text>
  </g>
  <text x="56" y="350" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#9aa7b5">github.com/DENGYUFAN0  ·  the compass tools</text>
</svg>
